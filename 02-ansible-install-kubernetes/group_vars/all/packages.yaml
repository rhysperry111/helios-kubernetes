---
#
# Packages
# k8s_core_packages  : required for every node (installed from k8s + docker-ce repos)
# k8s_addon_packages : optional node-level packages
# k8s_controller_packages: admin tools installed on controllers
#
k8s_core_packages:
  - containerd.io
  - kubeadm
  - kubelet

k8s_addon_packages:
  - ceph-common # For CSI
  - iproute-tc # For CNI

k8s_controller_packages:
  - kubectl
  - git
  - nano
  - less
  # helm and k9s are installed separately with pinned versions from helios.yaml
