---
- name: Init | Wait for hosts
  hosts: all
  gather_facts: false
  tasks:
    - name: Wait for SSH connection
      wait_for_connection:
        timeout: 300

- name: Common | System configuration
  hosts: all
  become: true
  tasks:

    - name: Common | Disable subsequent cloud-init runs
      file:
        path: /etc/cloud/cloud-init.disabled
        state: touch
        owner: root
        group: root
        mode: "0644"
      changed_when: false

    - name: Common | Remove swap entry from fstab
      lineinfile:
        path: /etc/fstab
        search_string: swap
        state: absent

    - name: Common | Disable zram-generator (Fedora default swap)
      file:
        path: /etc/systemd/zram-generator.conf
        state: absent
      register: zram_removed

    - name: Common | Stop and disable systemd-zram-setup if present
      systemd_service:
        name: "systemd-zram-setup@zram0.service"
        enabled: false
        state: stopped
      failed_when: false

    - name: Common | Check if swap is active
      command: swapon --show
      register: swap_active
      changed_when: false

    - name: Common | Disable swap at runtime
      command: swapoff -a
      when: swap_active.stdout != ""

    - name: Common | Configure required kernel modules (load at boot)
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        owner: root
        group: root
        mode: "0644"
      register: kmod_conf

    - name: Common | Load required kernel modules now
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Common | Configure kernel networking parameters
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        owner: root
        group: root
        mode: "0644"
      register: sysctl_conf

    - name: Common | Apply sysctl parameters
      command: sysctl --system
      when: sysctl_conf.changed
      changed_when: true

    - name: Common | Set SELinux to permissive
      selinux:
        policy: targeted
        state: permissive

    - name: Common | Disable firewalld
      systemd_service:
        name: firewalld
        enabled: false
        state: stopped
      failed_when: false

    - name: Common | Set FQDN hostname
      hostname:
        name: "{{ inventory_hostname }}.{{ k8s_domain }}"
        use: systemd

    - name: Common | Write /etc/hosts
      template:
        src: ./resources/hosts.j2
        dest: /etc/hosts
        owner: root
        group: root
        mode: "0644"

    - name: Common | Add Kubernetes YUM repo (v{{ k8s_version }})
      copy:
        dest: /etc/yum.repos.d/kubernetes.repo
        content: |
          [kubernetes]
          name=Kubernetes
          baseurl=https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/rpm/
          enabled=1
          gpgcheck=1
          gpgkey=https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/rpm/repodata/repomd.xml.key
        owner: root
        group: root
        mode: "0644"

    - name: Common | Add Docker CE repo (for containerd.io)
      command: >
        dnf config-manager addrepo --from-repofile=https://download.docker.com/linux/fedora/docker-ce.repo
      args:
        creates: /etc/yum.repos.d/docker-ce.repo

    - name: Common | Update all packages
      dnf:
        name: "*"
        state: latest
        update_cache: true
      register: pkg_upgrade

    - name: Common | Install core Kubernetes packages
      dnf:
        name: "{{ k8s_core_packages }}"
        state: present
      register: pkg_core

    - name: Common | Install addon packages
      dnf:
        name: "{{ k8s_addon_packages }}"
        state: present
      register: pkg_addon
      when: k8s_addon_packages | length > 0

    - name: Common | Create containerd config directory
      file:
        path: /etc/containerd
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Common | Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml

    - name: Common | Enable SystemdCgroup in containerd config
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup\s*=\s*false'
        replace: 'SystemdCgroup = true'
      register: containerd_conf

    - name: Common | Reboot nodes if required
      reboot:
        reboot_timeout: 300
      when: >
        pkg_core.changed or
        pkg_upgrade.changed or
        kmod_conf.changed or
        zram_removed.changed

    - name: Common | Enable and start core services
      systemd_service:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - containerd
        - kubelet

    - name: Common | Enable and start iSCSI daemon
      systemd_service:
        name: iscsid
        enabled: true
        state: started
      when: "'iscsi-initiator-utils' in k8s_addon_packages"

    - name: Common | Restart containerd if config changed
      systemd_service:
        name: containerd
        state: restarted
      when: containerd_conf.changed

- name: Controllers | Deploy kube-vip static pod
  hosts: controllers
  become: true
  tasks:

    - name: kube-vip | Create manifests directory
      file:
        path: /etc/kubernetes/manifests
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: kube-vip | Pull image ({{ kube_vip_version }})
      command: >
        ctr --namespace k8s.io image pull
        ghcr.io/kube-vip/kube-vip:{{ kube_vip_version }}
      changed_when: false

    - name: kube-vip | Generate static pod manifest
      shell: >
        ctr --namespace k8s.io run --rm --net-host
        ghcr.io/kube-vip/kube-vip:{{ kube_vip_version }}
        kube-vip-gen-{{ ansible_date_time.epoch }}
        /kube-vip manifest pod
        --interface {{ k8s_vip_interface }}
        --address {{ k8s_vip }}
        --controlplane
        --arp
        --leaderElection
        > /etc/kubernetes/manifests/kube-vip.yaml
      args:
        creates: /etc/kubernetes/manifests/kube-vip.yaml

    - name: kube-vip | Patch manifest to use super-admin.conf (required k8s >= 1.29)
      replace:
        path: /etc/kubernetes/manifests/kube-vip.yaml
        regexp: '(path: /etc/kubernetes/)admin\.conf'
        replace: '\1super-admin.conf'
      when: inventory_hostname == groups['controllers'][0]

- name: Controllers | Bootstrap primary controller
  hosts: "{{ groups['controllers'][0] }}"
  become: true
  tasks:

    - name: Bootstrap | Create kubeadm config directory
      file:
        path: /etc/kubeadm
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Bootstrap | Template kubeadm init config
      template:
        src: ./resources/kubeadm.yaml.j2
        dest: /etc/kubeadm/init.yaml
        owner: root
        group: root
        mode: "0644"

    - name: Bootstrap | Initialise cluster
      command: kubeadm init --config /etc/kubeadm/init.yaml --upload-certs
      args:
        creates: /etc/kubernetes/kubelet.conf

    - name: Bootstrap | Generate worker join command
      command: kubeadm token create --print-join-command
      register: worker_join_cmd
      changed_when: false

    - name: Bootstrap | Upload certificates and capture key
      shell: >
        kubeadm init phase upload-certs --upload-certs 2>/dev/null | tail -1
      register: cert_key_cmd
      changed_when: false

    - name: Bootstrap | Export join commands as facts (available to other plays)
      set_fact:
        worker_join_command: "{{ worker_join_cmd.stdout }}"
        controller_join_command: >-
          {{ worker_join_cmd.stdout }}
          --control-plane
          --certificate-key {{ cert_key_cmd.stdout | trim }}

- name: Controllers | Join secondary controllers to control plane
  hosts: controllers
  become: true
  serial: 1  # Join one at a time to avoid etcd race conditions
  tasks:

    - name: Secondary controllers | Join control plane
      command: >
        {{ hostvars[groups['controllers'][0]].controller_join_command }}
      args:
        creates: /etc/kubernetes/kubelet.conf
      when: inventory_hostname != groups['controllers'][0]

- name: Workers | Join cluster
  hosts: workers
  become: true
  tasks:

    - name: Workers | Join cluster
      command: >
        {{ hostvars[groups['controllers'][0]].worker_join_command }}
      args:
        creates: /etc/kubernetes/kubelet.conf

- name: Controllers | Install admin tools and export kubeconfig
  hosts: controllers
  become: false
  tasks:

    - name: Admin | Install controller packages (dnf)
      dnf:
        name: "{{ k8s_controller_packages }}"
        state: present
      become: true

    - name: Admin | Install Helm {{ helm_version }}
      shell: |
        curl -fsSL https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz \
          | tar xz --strip-components=1 -C /usr/local/bin linux-amd64/helm
        chmod +x /usr/local/bin/helm
      args:
        creates: /usr/local/bin/helm
      become: true

    - name: Admin | Install k9s {{ k9s_version }}
      shell: |
        curl -fsSL "https://github.com/derailed/k9s/releases/download/{{ k9s_version }}/k9s_Linux_amd64.tar.gz" \
          | tar xz -C /usr/local/bin k9s
        chmod +x /usr/local/bin/k9s
      args:
        creates: /usr/local/bin/k9s
      become: true

    - name: Admin | Create .kube directory
      file:
        path: "/home/{{ k8s_admin_user }}/.kube"
        state: directory
        owner: "{{ k8s_admin_user }}"
        group: "{{ k8s_admin_user }}"
        mode: "0755"

    - name: Admin | Copy admin.conf to user home
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ k8s_admin_user }}/.kube/config"
        owner: "{{ k8s_admin_user }}"
        group: "{{ k8s_admin_user }}"
        mode: "0600"
        remote_src: true
      become: true

    - name: Admin | Fetch kubeconfig for downstream Terraform steps
      fetch:
        src: /etc/kubernetes/admin.conf
        dest: "{{ item }}/kubeconfig.autogen.yaml"
        flat: true
      become: true
      run_once: true
      loop:
        - ../03-terraform-deploy-interfaces
        - ../04-terraform-setup-networking
        - ../05-terraform-deploy-gitops
